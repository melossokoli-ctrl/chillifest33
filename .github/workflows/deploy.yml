name: Build dhe deploy ne Network Solutions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Merr kodin
        uses: actions/checkout@v4

      - name: Instalo Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalo paketat
        run: npm ci

      - name: Ndertimi
        run: npm run build
        env:
          VITE_SITE_URL: https://www.chillifeste.com

      - name: Ngarko ne Network Solutions (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
